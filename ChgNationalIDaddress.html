document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { -webkit-tap-highlight-color: transparent; box-sizing:border-box; }\n  body { margin:0; background:#d9dde4; font-family:'Sarabun',sans-serif; color:#222; }\n  a { color:#2f4bb0; } a:hover { color:#22368a; }\n  input, textarea, select { font-family:'Sarabun',sans-serif; }\n  input:focus, textarea:focus, select:focus { outline:2px solid #7d8fd6; outline-offset:-1px; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;display:flex;justify-content:center;padding:20px 12px 60px;\">\n  <div style=\"width:100%;max-width:440px;background:#fff;box-shadow:0 6px 28px rgba(30,40,80,.14);border-radius:6px;overflow:hidden;\">\n\n    <div style=\"background:#34426b;color:#fff;text-align:center;font-size:15px;font-weight:600;padding:14px;\">แก้ไขที่อยู่ตามบัตรประชาชน<\u002Fdiv>\n\n    <!-- Stepper (hidden on chooser) -->\n    <sc-if value=\"{{ showStepper }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:0;padding:16px 22px 6px;\">\n        <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;align-items:center;\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:5px;width:78px;\">\n              <div style=\"width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:{{ st.bg }};color:{{ st.fg }};border:1.5px solid {{ st.border }};\">{{ st.mark }}<\u002Fdiv>\n              <div style=\"font-size:10.5px;text-align:center;line-height:1.25;color:{{ st.labelColor }};\">{{ st.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ st.showBar }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"width:26px;height:2px;background:{{ st.barColor }};margin:0 -12px 20px;\"><\u002Fdiv><\u002Fsc-if>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ SCREEN: CHOOSE METHOD ============ -->\n    <sc-if value=\"{{ isChoose }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:20px 20px 26px;\">\n        <div style=\"font-size:20px;font-weight:700;color:#28304d;margin-bottom:6px;\">เลือกวิธียืนยันตัวตน<\u002Fdiv>\n        <div style=\"font-size:13px;color:#6a7080;line-height:1.55;margin-bottom:22px;\">เพื่อความปลอดภัยในการแก้ไขที่อยู่ตามบัตรประชาชน กรุณาเลือกวิธียืนยันตัวตนอย่างใดอย่างหนึ่ง<\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <div sc-camel-on-click=\"{{ pickIdCard }}\" style=\"cursor:pointer;border:1.5px solid {{ idCardBorder }};background:{{ idCardBg }};border-radius:12px;padding:18px;display:flex;gap:15px;align-items:center;\">\n            <div style=\"width:52px;height:52px;flex-shrink:0;border-radius:12px;background:#eaf1fb;display:flex;align-items:center;justify-content:center;font-size:26px;\">🪪<\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font-size:15px;font-weight:700;color:#28304d;margin-bottom:3px;\">ถ่ายรูปบัตรประชาชน<\u002Fdiv>\n              <div style=\"font-size:12px;color:#6a7080;line-height:1.5;\">ถ่ายภาพหรืออัปโหลดรูปบัตร แล้วกรอกเลขหลังบัตรเพื่อยืนยันตัวตน<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:18px;color:{{ idCardCheck }};\">{{ idCardMark }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div sc-camel-on-click=\"{{ pickThaid }}\" style=\"cursor:pointer;border:1.5px solid {{ thaidBorder }};background:{{ thaidBg }};border-radius:12px;padding:18px;display:flex;gap:15px;align-items:center;\">\n            <div style=\"width:52px;height:52px;flex-shrink:0;border-radius:12px;background:#e9f7ef;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#1b9b6b;\">D<\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font-size:15px;font-weight:700;color:#28304d;margin-bottom:3px;\">ยืนยันผ่านแอป ThaID<\u002Fdiv>\n              <div style=\"font-size:12px;color:#6a7080;line-height:1.5;\">ยืนยันตัวตนด้วยแอป ThaID ระบบจะดึงข้อมูลที่อยู่ให้อัตโนมัติ<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:18px;color:{{ thaidCheck }};\">{{ thaidMark }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-size:11.5px;color:#8a8a94;line-height:1.5;margin-top:18px;background:#f6f7fa;border-radius:8px;padding:12px 14px;\">\n          <b style=\"color:#5a6070;\">แนะนำ<\u002Fb> — หากท่านมีแอป ThaID ที่ลงทะเบียนแล้ว การยืนยันผ่าน ThaID จะรวดเร็วและไม่ต้องกรอกที่อยู่เอง\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ SCREEN: ID CARD PHOTO ============ -->\n    <sc-if value=\"{{ isPhoto }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:8px 20px 26px;\">\n        <div style=\"font-size:20px;font-weight:700;color:#28304d;margin-bottom:6px;\">ถ่ายรูปบัตรประชาชน<\u002Fdiv>\n        <div style=\"font-size:13px;color:#6a7080;line-height:1.55;margin-bottom:20px;\">ถ่ายภาพ<b>ด้านหน้า<\u002Fb>ของบัตรประชาชนให้ชัดเจน ตัวอักษรอ่านได้ครบถ้วน และอยู่ในกรอบที่กำหนด<\u002Fdiv>\n\n        <div style=\"position:relative;width:100%;aspect-ratio:1.586;border-radius:14px;overflow:hidden;background:#11151f;display:flex;align-items:center;justify-content:center;\">\n          <sc-if value=\"{{ hasPhoto }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;inset:0;background:linear-gradient(135deg,#dfe6f0,#c3cddd);\"><\u002Fdiv>\n            <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#4a556f;\">\n              <div style=\"font-size:34px;\">🪪<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:600;\">ถ่ายภาพเรียบร้อยแล้ว<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noPhoto }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"color:#6b7488;font-size:34px;\">📷<\u002Fdiv>\n            <div style=\"position:absolute;left:16px;top:16px;width:26px;height:26px;border-left:3px solid #6ea8ff;border-top:3px solid #6ea8ff;border-radius:5px 0 0 0;\"><\u002Fdiv>\n            <div style=\"position:absolute;right:16px;top:16px;width:26px;height:26px;border-right:3px solid #6ea8ff;border-top:3px solid #6ea8ff;border-radius:0 5px 0 0;\"><\u002Fdiv>\n            <div style=\"position:absolute;left:16px;bottom:16px;width:26px;height:26px;border-left:3px solid #6ea8ff;border-bottom:3px solid #6ea8ff;border-radius:0 0 0 5px;\"><\u002Fdiv>\n            <div style=\"position:absolute;right:16px;bottom:16px;width:26px;height:26px;border-right:3px solid #6ea8ff;border-bottom:3px solid #6ea8ff;border-radius:0 0 5px 0;\"><\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:12px;margin-top:20px;\">\n          <label style=\"flex:1;\">\n            <input type=\"file\" accept=\"image/*\" capture=\"environment\" sc-camel-on-change=\"{{ onCapture }}\" style=\"display:none;\">\n            <span style=\"display:flex;align-items:center;justify-content:center;gap:8px;background:#2f6fdb;color:#fff;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 3px 10px rgba(47,111,219,.3);text-align:center;line-height:1.3;\">📷 {{ captureLabel }}<\u002Fspan>\n          <\u002Flabel>\n          <label style=\"flex:1;\">\n            <input type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ onCapture }}\" style=\"display:none;\">\n            <span style=\"display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;color:#2f6fdb;border:1.5px solid #2f6fdb;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;line-height:1.3;\">⬆ {{ uploadLabel }}<\u002Fspan>\n          <\u002Flabel>\n        <\u002Fdiv>\n\n        <div style=\"font-size:11.5px;color:#8a8a94;line-height:1.5;margin-top:16px;background:#f6f7fa;border-radius:8px;padding:12px 14px;\">\n          <b style=\"color:#5a6070;\">คำแนะนำ<\u002Fb><br>• ถ่ายภาพด้วยกล้อง หรือเลือกไฟล์รูปภาพที่มีอยู่แล้ว<br>• ถ่าย/สแกนให้เห็นบัตรเต็มใบ ไม่เบลอ ไม่มีแสงสะท้อน<br>• รองรับไฟล์ .jpg .png ระบบจะอ่านข้อมูลจากภาพโดยอัตโนมัติ\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ SCREEN: ID CARD VERIFY ============ -->\n    <sc-if value=\"{{ isVerify }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:8px 20px 26px;\">\n        <div style=\"font-size:20px;font-weight:700;color:#28304d;margin-bottom:6px;\">ยืนยันข้อมูลบัตร<\u002Fdiv>\n        <div style=\"font-size:13px;color:#6a7080;line-height:1.55;margin-bottom:20px;\">{{ s2Intro }}<\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:16px;\">\n          <div>\n            <label style=\"display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px;\">เลขประจำตัวประชาชน <span style=\"color:#d33;\">*<\u002Fspan><\u002Flabel>\n            <input type=\"text\" inputmode=\"numeric\" maxlength=\"17\" value=\"{{ idNumber }}\" sc-camel-on-input=\"{{ onIdNumber }}\" placeholder=\"X XXXX XXXXX XX X\" style=\"width:100%;padding:11px 12px;border:1px solid {{ idBorder }};border-radius:6px;font-size:16px;letter-spacing:1px;background:#fff;\">\n            <sc-if value=\"{{ idError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:11px;color:#c0392b;margin-top:5px;\">⚠ {{ idError }}<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px;\">เลขหลังบัตร (Laser Code) <span style=\"color:#d33;\">*<\u002Fspan><\u002Flabel>\n            <input type=\"text\" maxlength=\"14\" value=\"{{ laserCode }}\" sc-camel-on-input=\"{{ onLaser }}\" placeholder=\"XX0-0000000-00\" style=\"width:100%;padding:11px 12px;border:1px solid {{ laserBorder }};border-radius:6px;font-size:16px;letter-spacing:1px;background:#fff;text-transform:uppercase;\">\n            <div style=\"font-size:11px;color:#8a8a94;margin-top:5px;line-height:1.45;\">รหัส 12 หลักหลังบัตร ขึ้นต้นด้วยตัวอักษร 2 ตัว (เช่น JT1-2345678-90)<\u002Fdiv>\n            <sc-if value=\"{{ laserError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:11px;color:#c0392b;margin-top:5px;\">⚠ {{ laserError }}<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ SCREEN: THAID VERIFY ============ -->\n    <sc-if value=\"{{ isThaid }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:8px 20px 26px;\">\n        <div style=\"font-size:20px;font-weight:700;color:#28304d;margin-bottom:6px;\">ยืนยันตัวตนผ่านแอป ThaID<\u002Fdiv>\n        <div style=\"font-size:13px;color:#6a7080;line-height:1.55;margin-bottom:20px;\">ทำตามขั้นตอนด้านล่างเพื่อยืนยันตัวตนด้วยแอป ThaID บนมือถือของท่าน<\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:20px;\">\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><div style=\"width:24px;height:24px;flex-shrink:0;border-radius:50%;background:#1b9b6b;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;\">1<\u002Fdiv><div style=\"font-size:13px;color:#3a414d;line-height:1.5;padding-top:2px;\">เปิดแอป <b>ThaID<\u002Fb> บนโทรศัพท์มือถือ<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><div style=\"width:24px;height:24px;flex-shrink:0;border-radius:50%;background:#1b9b6b;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;\">2<\u002Fdiv><div style=\"font-size:13px;color:#3a414d;line-height:1.5;padding-top:2px;\">เลือกเมนู <b>สแกน QR<\u002Fb> แล้วสแกนรหัสด้านล่าง<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><div style=\"width:24px;height:24px;flex-shrink:0;border-radius:50%;background:#1b9b6b;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;\">3<\u002Fdiv><div style=\"font-size:13px;color:#3a414d;line-height:1.5;padding-top:2px;\">กด <b>ยืนยันตัวตน<\u002Fb> ในแอป และสแกนใบหน้าตามที่ระบบแจ้ง<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;align-items:center;background:#f6f7fa;border:1px solid #e6e8ef;border-radius:12px;padding:22px;\">\n          <div style=\"width:168px;height:168px;background:#fff;border:1px solid #dfe3ea;border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;\">\n            <div style=\"position:absolute;inset:16px;background-image:repeating-linear-gradient(0deg,#28304d 0 6px,transparent 6px 12px),repeating-linear-gradient(90deg,#28304d 0 6px,transparent 6px 12px);background-size:12px 12px;opacity:.9;-webkit-mask:radial-gradient(circle at 22% 22%,#000 0 26px,transparent 27px),radial-gradient(circle at 78% 22%,#000 0 26px,transparent 27px),radial-gradient(circle at 22% 78%,#000 0 26px,transparent 27px),linear-gradient(#000,#000);\"><\u002Fdiv>\n            <div style=\"position:absolute;left:22px;top:22px;width:34px;height:34px;border:6px solid #28304d;\"><\u002Fdiv>\n            <div style=\"position:absolute;right:22px;top:22px;width:34px;height:34px;border:6px solid #28304d;\"><\u002Fdiv>\n            <div style=\"position:absolute;left:22px;bottom:22px;width:34px;height:34px;border:6px solid #28304d;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;color:#8a90a0;margin-top:12px;\">QR สำหรับยืนยันตัวตน · หมดอายุใน 05:00 นาที<\u002Fdiv>\n\n          <sc-if value=\"{{ thaidPending }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-top:14px;font-size:12.5px;color:#b5721a;background:#fdf1e3;border:1px solid #f0cfa0;border-radius:20px;padding:6px 14px;\">⏳ รอการยืนยันจากแอป ThaID…<\u002Fdiv>\n            <button sc-camel-on-click=\"{{ simulateThaid }}\" style=\"margin-top:14px;background:#1b9b6b;color:#fff;border:none;border-radius:7px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;\">📱 จำลอง: ยืนยันในแอปสำเร็จ<\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ thaidConfirmed }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;font-weight:600;color:#2f9e5b;background:#e7f4ec;border:1px solid #b9d6bf;border-radius:20px;padding:6px 16px;\">✓ ยืนยันตัวตนผ่าน ThaID สำเร็จ<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:flex-start;gap:9px;background:#eef4fc;border:1px solid #cADBF1;border-left:3px solid #2f6fdb;border-radius:6px;padding:11px 13px;margin-top:18px;\">\n          <span style=\"font-size:14px;\">ℹ️<\u002Fspan>\n          <span style=\"font-size:11.5px;color:#33507e;line-height:1.55;\">เมื่อยืนยันตัวตนสำเร็จ ระบบจะดึงข้อมูลชื่อและที่อยู่จาก ThaID มาแสดงในหน้าถัดไปโดยอัตโนมัติ<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ SCREEN: ADDRESS (shared) ============ -->\n    <sc-if value=\"{{ isAddress }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:8px 20px 26px;\">\n        <div style=\"font-size:20px;font-weight:700;color:#28304d;margin-bottom:6px;\">ตรวจสอบและแก้ไขที่อยู่<\u002Fdiv>\n        <div style=\"font-size:13px;color:#6a7080;line-height:1.55;margin-bottom:18px;\">{{ addrIntro }}<\u002Fdiv>\n\n        <div style=\"background:#f6f7fa;border:1px solid #e6e8ef;border-radius:10px;padding:16px;margin-bottom:18px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:1px;color:#8a8fa3;margin-bottom:12px;\">ข้อมูลผู้ถือบัญชี<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px;\">\n            <div>\n              <div style=\"font-size:11.5px;color:#8a8fa3;margin-bottom:2px;\">ชื่อ-นามสกุล (ไทย)<\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:600;color:#28304d;\">{{ nameTh }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:11.5px;color:#8a8fa3;margin-bottom:2px;\">Full Name (English)<\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:600;color:#28304d;\">{{ nameEn }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid #e6e8ef;padding-top:12px;\">\n              <div style=\"font-size:11.5px;color:#8a8fa3;\">เลขที่บัญชีหุ้น<\u002Fdiv>\n              <div style=\"font-size:16px;font-weight:700;color:#2f6fdb;letter-spacing:1px;\">{{ shareAccount }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;\">\n          <label style=\"font-size:13px;font-weight:600;color:#333;\">ที่อยู่ตามบัตรประชาชน <span style=\"color:#d33;\">*<\u002Fspan><\u002Flabel>\n          \n        <\u002Fdiv>\n        <textarea value=\"{{ address }}\" sc-camel-on-change=\"{{ onAddress }}\" readonly=\"{{ addrReadOnly }}\" style=\"width:100%;min-height:96px;padding:11px 12px;border:1px solid {{ addrFieldBorder }};border-radius:6px;font-size:14px;line-height:1.55;resize:vertical;background:{{ addrFieldBg }};color:{{ addrFieldColor }};\"><\u002Ftextarea>\n        <sc-if value=\"{{ addrError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:11px;color:#c0392b;margin-top:5px;\">⚠ {{ addrError }}<\u002Fdiv><\u002Fsc-if>\n        <div style=\"font-size:11px;color:#8a8a94;margin-top:6px;line-height:1.45;\">{{ addrHelp }}<\u002Fdiv>\n\n        <div style=\"margin-top:22px;border-top:1px solid #eceef3;padding-top:18px;\">\n          <div style=\"font-size:12px;color:#c0392b;font-weight:600;line-height:1.55;margin-bottom:14px;\">* การเปลี่ยนแปลงที่อยู่นี้มีผลกับทุกประเภทบัญชีของท่านที่มีอยู่กับบริษัทฯ<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#5a6070;line-height:1.55;margin-bottom:14px;\">กรุณาใส่รหัสผ่าน แล้วกดปุ่ม \"บันทึกที่อยู่\" เพื่อยืนยันการแจ้งความประสงค์ผ่านระบบออนไลน์<\u002Fdiv>\n          <label style=\"display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px;\">กรุณากรอก <span style=\"color:#c0392b;\">รหัสผ่าน<\u002Fspan> <span style=\"color:#d33;\">*<\u002Fspan><\u002Flabel>\n          <input type=\"password\" value=\"{{ password }}\" sc-camel-on-input=\"{{ onPassword }}\" placeholder=\"รหัสผ่าน\" autocomplete=\"current-password\" style=\"width:100%;padding:11px 12px;border:1px solid {{ pwBorder }};border-radius:6px;font-size:15px;background:#fff;\">\n          <sc-if value=\"{{ pwError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:11px;color:#c0392b;margin-top:5px;\">⚠ {{ pwError }}<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ DONE ============ -->\n    <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:fixed;inset:0;background:rgba(20,25,45,.5);display:flex;align-items:center;justify-content:center;padding:28px;z-index:60;\">\n        <div style=\"background:#fff;border-radius:10px;max-width:300px;width:100%;padding:30px 26px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.3);\">\n          <div style=\"width:76px;height:76px;border-radius:50%;border:3px solid #7ecb9a;color:#2f9e5b;font-size:42px;line-height:70px;margin:0 auto 18px;\">✓<\u002Fdiv>\n          <div style=\"font-size:15px;color:#4a5060;line-height:1.55;margin-bottom:22px;\">บริษัทได้รับคำสั่งของท่านแล้ว<\u002Fdiv>\n          <button sc-camel-on-click=\"{{ done }}\" style=\"background:#3aaa5a;color:#fff;border:none;border-radius:6px;padding:10px 46px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;\">OK<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ NAV ============ -->\n    <sc-if value=\"{{ showNav }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;gap:12px;padding:4px 20px 24px;\">\n        <sc-if value=\"{{ showBack }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ back }}\" style=\"flex:0 0 auto;background:#eef0f5;color:#34426b;border:1px solid #cdd3e2;border-radius:8px;padding:13px 22px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;\">ย้อนกลับ<\u002Fbutton>\n        <\u002Fsc-if>\n        <button sc-camel-on-click=\"{{ next }}\" disabled=\"{{ nextDisabled }}\" style=\"flex:1;background:{{ nextBg }};color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:600;cursor:{{ nextCursor }};font-family:inherit;box-shadow:{{ nextShadow }};\">{{ nextLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    method: null,          // 'idcard' | 'thaid'\n    screen: 'choose',      // choose | photo | verify | thaid | address | done\n    hasPhoto: false,\n    idNumber: '', laserCode: '',\n    thaidConfirmed: false,\n    address: '199/24 หมู่ 3 ซอยลาดพร้าว 15 ถนนลาดพร้าว แขวงจอมพล เขตจตุจักร กรุงเทพมหานคร 10900',\n    password: '',\n    submitted: false,\n  };\n\n  fmtId(raw) {\n    const d = (raw||'').replace(/\\D/g,'').slice(0,13);\n    return [d.slice(0,1), d.slice(1,5), d.slice(5,10), d.slice(10,12), d.slice(12,13)].filter(Boolean).join(' ');\n  }\n  fmtLaser(raw) {\n    const c = (raw||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,12);\n    return [c.slice(0,3), c.slice(3,10), c.slice(10,12)].filter(Boolean).join('-');\n  }\n  idDigits(){ return this.state.idNumber.replace(/\\D/g,''); }\n  laserChars(){ return this.state.laserCode.replace(/[^A-Z0-9]/g,''); }\n\n  next = () => {\n    const s = this.state;\n    switch (s.screen) {\n      case 'photo':\n        this.setState({screen:'verify', submitted:false, idNumber:this.fmtId('1103700456789'), laserCode:this.fmtLaser('JT1234567890')});\n        return;\n      case 'verify':\n        if (this.idDigits().length !== 13 || this.laserChars().length !== 12) { this.setState({submitted:true}); return; }\n        this.setState({screen:'address', submitted:false});\n        return;\n      case 'thaid':\n        if (!s.thaidConfirmed) { this.setState({submitted:true}); return; }\n        this.setState({screen:'address', submitted:false});\n        return;\n      case 'address':\n        if (!s.address.trim() || s.password.length < 6) { this.setState({submitted:true}); return; }\n        this.setState({screen:'done', submitted:false});\n        return;\n    }\n  };\n\n  back = () => {\n    const s = this.state;\n    const prev = {\n      photo:'choose', verify:'photo', thaid:'choose',\n      address: s.method === 'thaid' ? 'thaid' : 'verify',\n    };\n    this.setState({screen: prev[s.screen] || 'choose', submitted:false});\n  };\n\n  reset(){ return {method:null, screen:'choose', hasPhoto:false, idNumber:'', laserCode:'', thaidConfirmed:false, password:'', submitted:false}; }\n\n  renderVals() {\n    const s = this.state;\n    const isThaidFlow = s.method === 'thaid';\n\n    // Stepper definition per method\n    const stepDef = isThaidFlow\n      ? [{key:'thaid',label:'ยืนยันตัวตน ThaID'},{key:'address',label:'แก้ไขที่อยู่'}]\n      : [{key:'photo',label:'ถ่ายรูปบัตร'},{key:'verify',label:'ยืนยันข้อมูล'},{key:'address',label:'แก้ไขที่อยู่'}];\n    const curScreen = s.screen === 'done' ? 'address' : s.screen;\n    const curIdx = stepDef.findIndex(d => d.key === curScreen);\n    const steps = stepDef.map((d,i) => {\n      const done = i < curIdx, active = i === curIdx;\n      return {\n        label:d.label,\n        mark: done ? '✓' : String(i+1),\n        bg: done ? '#2f9e5b' : active ? '#2f6fdb' : '#fff',\n        fg: (done||active) ? '#fff' : '#9aa0b0',\n        border: done ? '#2f9e5b' : active ? '#2f6fdb' : '#cfcfd4',\n        labelColor: active ? '#28304d' : '#9aa0b0',\n        showBar: i < stepDef.length-1,\n        barColor: i < curIdx ? '#2f9e5b' : '#dcdee6',\n      };\n    });\n\n    const idOk = this.idDigits().length === 13;\n    const laserOk = this.laserChars().length === 12;\n\n    // Nav button\n    let nextLabel = 'ถัดไป', nextDisabled = false;\n    if (s.screen === 'photo') nextDisabled = !s.hasPhoto;\n    if (s.screen === 'thaid') nextDisabled = !s.thaidConfirmed;\n    if (s.screen === 'address') nextLabel = 'บันทึกที่อยู่';\n\n    return {\n      showStepper: s.screen !== 'choose',\n      steps,\n      isChoose: s.screen==='choose',\n      isPhoto: s.screen==='photo',\n      isVerify: s.screen==='verify',\n      isThaid: s.screen==='thaid',\n      isAddress: s.screen==='address' || s.screen==='done',\n      isDone: s.screen==='done',\n      showNav: s.screen!=='choose' && s.screen!=='done',\n      showBack: s.screen==='verify' || s.screen==='address' || s.screen==='photo' || s.screen==='thaid',\n      done: ()=>this.setState(this.reset()),\n\n      // chooser\n      pickIdCard: ()=>this.setState({method:'idcard', screen:'photo', submitted:false}),\n      pickThaid: ()=>this.setState({method:'thaid', screen:'thaid', thaidConfirmed:false, submitted:false}),\n      idCardBorder:'#dfe3ea', idCardBg:'#fff', idCardCheck:'#cfd4dd', idCardMark:'›',\n      thaidBorder:'#dfe3ea', thaidBg:'#fff', thaidCheck:'#cfd4dd', thaidMark:'›',\n\n      // photo\n      hasPhoto: s.hasPhoto, noPhoto: !s.hasPhoto,\n      captureLabel: s.hasPhoto ? 'ถ่ายใหม่' : 'ถ่ายด้วยกล้อง',\n      uploadLabel: s.hasPhoto ? 'เลือกไฟล์ใหม่' : 'อัปโหลดรูปภาพ',\n      onCapture: (e)=>{ if(e.target.files && e.target.files[0]) this.setState({hasPhoto:true}); },\n\n      // verify\n      s2Intro: s.hasPhoto ? 'ระบบอ่านเลขบัตรจากภาพให้แล้ว โปรดตรวจสอบความถูกต้อง และกรอกเลขหลังบัตรเพื่อยืนยันตัวตน' : 'กรอกเลขประจำตัวประชาชน และเลขหลังบัตร เพื่อยืนยันตัวตน',\n      idNumber: s.idNumber, laserCode: s.laserCode,\n      onIdNumber: (e)=>this.setState({idNumber:this.fmtId(e.target.value), submitted:false}),\n      onLaser: (e)=>this.setState({laserCode:this.fmtLaser(e.target.value), submitted:false}),\n      idBorder: s.submitted && !idOk ? '#e0a19b' : '#cfcfd4',\n      laserBorder: s.submitted && !laserOk ? '#e0a19b' : '#cfcfd4',\n      idError: s.submitted && !idOk ? 'กรุณากรอกเลขบัตรให้ครบ 13 หลัก' : '',\n      laserError: s.submitted && !laserOk ? 'กรุณากรอกเลขหลังบัตรให้ครบ 12 หลัก' : '',\n\n      // thaid\n      thaidPending: !s.thaidConfirmed,\n      thaidConfirmed: s.thaidConfirmed,\n      simulateThaid: ()=>this.setState({thaidConfirmed:true, submitted:false}),\n\n      // address (shared)\n      addrIntro: isThaidFlow\n        ? 'ระบบดึงข้อมูลจาก ThaID ของท่านแล้ว โปรดตรวจสอบความถูกต้องและแก้ไขที่อยู่ให้เป็นปัจจุบัน'\n        : 'ระบบได้ดึงข้อมูลจากบัตรประชาชนแล้ว โปรดตรวจสอบความถูกต้องและแก้ไขที่อยู่ให้เป็นปัจจุบัน',\n      nameTh: 'นาย เศรษฐี ยิ่งรวย',\n      nameEn: 'MR. SEATTY  YINGROUY',\n      shareAccount: '000000N',\n      address: s.address,\n      onAddress: (e)=>{ if (isThaidFlow) return; this.setState({address:e.target.value, submitted:false}); },\n      addrError: s.submitted && !s.address.trim() ? 'กรุณากรอกที่อยู่' : '',\n      addrReadOnly: isThaidFlow,\n      addrHint: isThaidFlow ? '🔒 ดึงจาก ThaID · แก้ไขไม่ได้' : '✎ แก้ไขได้',\n      addrHintColor: isThaidFlow ? '#b3b3ba' : '#2f9e5b',\n      addrFieldBg: isThaidFlow ? '#ececee' : '#fff',\n      addrFieldColor: isThaidFlow ? '#555' : '#222',\n      addrFieldBorder: isThaidFlow ? '#d8d8dd' : '#cfcfd4',\n      addrHelp: isThaidFlow ? 'ที่อยู่นี้ดึงจากฐานข้อมูล ThaID โดยตรง จึงไม่สามารถแก้ไขได้' : 'ตัวอย่าง: บ้านเลขที่ / หมู่ / ซอย / ถนน / แขวง / เขต / จังหวัด / รหัสไปรษณีย์',\n      password: s.password,\n      onPassword: (e)=>this.setState({password:e.target.value, submitted:false}),\n      pwBorder: s.submitted && s.password.length < 6 ? '#e0a19b' : '#cfcfd4',\n      pwError: s.submitted && !s.password ? 'กรุณากรอกรหัสผ่านเพื่อยืนยัน' : (s.submitted && s.password.length < 6 ? 'รหัสผ่านไม่ถูกต้อง' : ''),\n\n      next: this.next, back: this.back,\n      nextLabel, nextDisabled,\n      nextBg: nextDisabled ? '#b9c2d6' : '#2f6fdb',\n      nextCursor: nextDisabled ? 'not-allowed' : 'pointer',\n      nextShadow: nextDisabled ? 'none' : '0 3px 10px rgba(47,111,219,.3)',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
